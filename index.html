<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Savong Dice Roller</title>
    
    <style>
        * { box-sizing: border-box; }
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between;
            min-height: 100vh; 
            margin: 0; 
            background-color: #1a1a1a; 
            color: #f0f0f0; 
            font-family: sans-serif; 
            padding: 40px 20px;
            text-align: center;
        }

        header h1 { color: #ffcc00; margin: 0; font-size: 1.8rem; }
        .subtitle { margin: 10px 0; font-size: 1rem; opacity: 0.8; }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            gap: 30px;
        }

        .dice-container { display: flex; gap: 20px; justify-content: center; }
        .die-wrapper { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .die-wrapper span { font-size: 0.9rem; font-weight: bold; letter-spacing: 2px; }

        .dice { 
            width: 140px; 
            height: 140px; 
            background-color: #333; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 0.8rem; 
            font-weight: bold; 
            border-radius: 20px; 
            border: 3px solid transparent; 
            cursor: not-allowed; 
            opacity: 0.4; 
            transition: 0.3s; 
            padding: 10px; 
            overflow: hidden;
        }

        .dice.active { 
            background-color: #444; 
            cursor: pointer; 
            opacity: 1; 
            border-color: #ffcc00; 
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.3); 
        }

        .dice.rolled { 
            background-color: #f0f0f0; 
            color: #1a1a1a; 
            opacity: 1; 
            cursor: default; 
        }

        .result-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .result-content img { 
            width: 80px; 
            height: 80px; 
            object-fit: contain; 
            display: block;
            margin-bottom: 8px;
        }

        .result-label {
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.2;
        }
        
        .rolling { animation: shake 0.1s infinite; background-color: #ffcc00 !important; color: #000 !important; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, 1px); } }
        
        button { 
            padding: 12px 40px; 
            background: transparent; 
            color: #ffcc00; 
            border: 2px solid #ffcc00; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background: #ffcc00; color: #1a1a1a; }
        
        footer { font-size: 0.7rem; color: #444; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>SAVONG</h1>
        <div class="subtitle">UNLIRISE NEU-PILIPINO</div>
    </header>

    <div class="main-content">
        <div class="dice-container">
            <div class="die-wrapper">
                <span>SALA</span>
                <div id="die-0" class="dice active" onclick="rollDice(0)">TAP TO FILTER</div>
            </div>
            <div class="die-wrapper">
                <span>PILI</span>
                <div id="die-1" class="dice" onclick="rollDice(1)">LOCKED</div>
            </div>
            <div class="die-wrapper">
                <span>PINO</span>
                <div id="die-2" class="dice" onclick="rollDice(2)">LOCKED</div>
            </div>
        </div>
        <button onclick="resetBoard()">RESET</button>
    </div>

    <footer>© 2026 AGOS PAYAPA. ALL RIGHTS RESERVED.</footer>

    <script>
        // Restored your original URL structure
        const dicePools = [
            [
                { name: "Anitu", url: "https://lh3.googleusercontent.com/d/1B18fMukrBuqL8AoVsPM_ImSdtcXkkf4j" },
                { name: "Halimao", url: "https://lh3.googleusercontent.com/d/1ZRuaa4xcZRo9juxlRS7IbFmT-ZuQ1Obc" },
                { name: "Bagani", url: "https://lh3.googleusercontent.com/d/1Ytgdrqf7E0WTk4vs7_k4kMhTAvTMiQvX" },
                { name: "Luzon", url: "https://lh3.googleusercontent.com/d/1VWVjBQxthC24VMJj3LG1pV3yEpS29zoB" },
                { name: "Visayas", url: "https://lh3.googleusercontent.com/d/1LNszfElRFvQpH-fFJukCYm5CefVS209p" },
                { name: "Mindanao", url: "https://lh3.googleusercontent.com/d/1zKtAkMMjeAVQ1h_M7s5T1fbRBr-fo8TV" }
            ],
            [
                { name: "Hiwaga", url: "https://lh3.googleusercontent.com/d/1eECinF1swrCkHUNEdvz-AyD4b2WF1nxN" },
                { name: "Kisig", url: "https://lh3.googleusercontent.com/d/1thbW1Ldz4QUhg5rylHeiG3WLfU-buSuH" },
                { name: "Sindak", url: "https://lh3.googleusercontent.com/d/1edNzzFfChAQmZmd59k1eqdsnF_0gvzwn" },
                { name: "Tabak's Choice", url: "https://lh3.googleusercontent.com/d/1RUzFvLs6EiQjBMxJ27zh70umusvSlAcc" },
                { name: "Tabang", url: "https://lh3.googleusercontent.com/d/1PHOxpe-WF0His_qY8TXn7Jidjo5jOOpP" },
                { name: "Taglay", url: "https://lh3.googleusercontent.com/d/1i9kFO4zx13w545vcXdq5ldS7dyZsk5M4" }
            ],
            [
                { name: "HIGHEST Wins", url: "https://lh3.googleusercontent.com/d/1cyxqwKDat5zv4KApjJuaaelMZRKnEHm5" },
                { name: "LOWEST Wins", url: "https://lh3.googleusercontent.com/d/1GoCEI7dpnx_dGsBYES0njnlFAPF6d2ci" },
                { name: "[Tabak +1] HIGHEST", url: "https://lh3.googleusercontent.com/d/1GmzPvAo3APbSpMMEBxami2oB0er_sbxl" },
                { name: "[Tabak -1] LOWEST", url: "https://lh3.googleusercontent.com/d/16Iwl0aDpJ3G94vNxO4MvYU2UzBTqscDP" },
                { name: "[Kalasag +1] HIGHEST", url: "https://lh3.googleusercontent.com/d/1WKP09DaRu8M5jv1OffpX28UFOBEO6Fxf" },
                { name: "[Kalasag -1] LOWEST", url: "https://lh3.googleusercontent.com/d/1QiAKKYobUbpst6BuMGpBgjJ10RavTYaE" }
            ]
        ];

        let currentStep = 0;

        function rollDice(index) {
            if (index !== currentStep) return;

            const dieElement = document.getElementById("die-" + index);
            dieElement.classList.add('rolling');
            dieElement.textContent = "ROLLING...";

            setTimeout(() => {
                const pool = dicePools[index];
                const result = pool[Math.floor(Math.random() * pool.length)];
                
                dieElement.textContent = ""; 
                dieElement.classList.remove('rolling', 'active');
                dieElement.classList.add('rolled');

                const contentDiv = document.createElement("div");
                contentDiv.className = "result-content";
                
                const img = document.createElement("img");
                img.src = result.url;
                // If the image fails to load, it will still show the text label
                img.alt = ""; 

                const label = document.createElement("div");
                label.className = "result-label";
                label.textContent = result.name;

                contentDiv.appendChild(img);
                contentDiv.appendChild(label);
                dieElement.appendChild(contentDiv);

                currentStep++;
                if (currentStep < 3) {
                    const nextDie = document.getElementById("die-" + currentStep);
                    nextDie.classList.add('active');
                    nextDie.textContent = "READY";
                }
            }, 800);
        }

        function resetBoard() { location.reload(); }
    </script>
</body>
</html>
