<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Savong Dice Roller</title>
    
    <style>
        * { box-sizing: border-box; }
        
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between;
            height: 100vh;
            height: -webkit-fill-available; 
            margin: 0; 
            background-color: #0c0c0c; 
            color: #f0f0f0; 
            font-family: sans-serif; 
            padding: 20px 10px;
            text-align: center;
            overflow: hidden; 
        }

        html { height: -webkit-fill-available; }

        header { margin-top: 20px; }
        header h1 { color: #ffcc00; margin: 0; font-size: 1.5rem; letter-spacing: 2px; }
        .subtitle { margin: 5px 0; font-size: 0.7rem; opacity: 0.6; letter-spacing: 1px; }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            width: 100%;
            gap: 4vh; 
        }

        .dice-container { 
            display: flex; 
            gap: 10px; 
            justify-content: center; 
            width: 100%;
            max-width: 500px;
        }

        .die-wrapper { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 8px; 
            flex: 1; 
        }

        .die-wrapper span { 
            font-size: 0.65rem; 
            font-weight: bold; 
            letter-spacing: 1px; 
            color: #fff;
        }

        .dice { 
            width: 100%;
            aspect-ratio: 1 / 1; 
            max-width: 110px; 
            background-color: #2a2a2a; 
            color: #888; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 0.6rem; 
            font-weight: bold; 
            border-radius: 12px; 
            border: 2px solid transparent; 
            cursor: not-allowed; 
            opacity: 0.4; 
            transition: 0.3s; 
            padding: 5px; 
            overflow: hidden;
            text-transform: uppercase;
        }

        .dice.active { 
            background-color: #333; 
            cursor: pointer; 
            opacity: 1; 
            border-color: #ffcc00; 
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.2); 
            color: #fff;
        }

        .dice.rolled { 
            background-color: #f0f0f0; 
            color: #1a1a1a; 
            opacity: 1; 
            cursor: default; 
        }

        .result-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .result-content img { 
            width: 70%; 
            height: 70%; 
            object-fit: contain; 
            margin-bottom: 4px;
        }

        .result-label {
            font-size: 0.55rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.1;
        }
        
        .rolling { animation: shake 0.1s infinite; background-color: #ffcc00 !important; color: #000 !important; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, 1px); } }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button { 
            padding: 10px 30px; 
            background: transparent; 
            color: #ffcc00; 
            border: 1px solid #ffcc00; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 0.8rem;
            font-weight: bold;
            transition: 0.2s;
            letter-spacing: 1px;
        }

        /* The Install Button - Hidden by default */
        #install-button {
            display: none;
            background: #ffcc00;
            color: #000;
        }
        
        footer { font-size: 0.6rem; color: #333; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>SAVONG</h1>
        <div class="subtitle">UNLIRISE NEU-PILIPINO</div>
    </header>

    <div class="main-content">
        <div class="dice-container">
            <div class="die-wrapper">
                <span>SALA</span>
                <div id="die-0" class="dice active" onclick="rollDice(0)">TAP TO FILTER</div>
            </div>
            <div class="die-wrapper">
                <span>PILI</span>
                <div id="die-1" class="dice" onclick="rollDice(1)">LOCKED</div>
            </div>
            <div class="die-wrapper">
                <span>PINO</span>
                <div id="die-2" class="dice" onclick="rollDice(2)">LOCKED</div>
            </div>
        </div>
        
        <div class="button-group">
            <button onclick="resetBoard()">RESET</button>
            <button id="install-button">INSTALL APP</button>
        </div>
    </div>

    <footer>© 2026 AGOS PAYAPA. ALL RIGHTS RESERVED.</footer>

    <script>
        const dicePools = [
            [
                { name: "Anitu", url: "https://lh3.googleusercontent.com/d/1B18fMukrBuqL8AoVsPM_ImSdtcXkkf4j" },
                { name: "Halimao", url: "https://lh3.googleusercontent.com/d/1ZRuaa4xcZRo9juxlRS7IbFmT-ZuQ1Obc" },
                { name: "Bagani", url: "https://lh3.googleusercontent.com/d/1Ytgdrqf7E0WTk4vs7_k4kMhTAvTMiQvX" },
                { name: "Luzon", url: "https://lh3.googleusercontent.com/d/1VWVjBQxthC24VMJj3LG1pV3yEpS29zoB" },
                { name: "Visayas", url: "https://lh3.googleusercontent.com/d/1LNszfElRFvQpH-fFJukCYm5CefVS209p" },
                { name: "Mindanao", url: "https://lh3.googleusercontent.com/d/1zKtAkMMjeAVQ1h_M7s5T1fbRBr-fo8TV" }
            ],
            [
                { name: "Hiwaga", url: "https://lh3.googleusercontent.com/d/1eECinF1swrCkHUNEdvz-AyD4b2WF1nxN" },
                { name: "Kisig", url: "https://lh3.googleusercontent.com/d/1thbW1Ldz4QUhg5rylHeiG3WLfU-buSuH" },
                { name: "Sindak", url: "https://lh3.googleusercontent.com/d/1edNzzFfChAQmZmd59k1eqdsnF_0gvzwn" },
                { name: "Tabak's Choice", url: "https://lh3.googleusercontent.com/d/1RUzFvLs6EiQjBMxJ27zh70umusvSlAcc" },
                { name: "Tabang", url: "https://lh3.googleusercontent.com/d/1PHOxpe-WF0His_qY8TXn7Jidjo5jOOpP" },
                { name: "Taglay", url: "https://lh3.googleusercontent.com/d/1i9kFO4zx13w545vcXdq5ldS7dyZsk5M4" }
            ],
            [
                { name: "HIGHEST Wins", url: "https://lh3.googleusercontent.com/d/1cyxqwKDat5zv4KApjJuaaelMZRKnEHm5" },
                { name: "LOWEST Wins", url: "https://lh3.googleusercontent.com/d/1GoCEI7dpnx_dGsBYES0njnlFAPF6d2ci" },
                { name: "[Tabak +1] HIGHEST", url: "https://lh3.googleusercontent.com/d/1GmzPvAo3APbSpMMEBxami2oB0er_sbxl" },
                { name: "[Tabak -1] LOWEST", url: "https://lh3.googleusercontent.com/d/16Iwl0aDpJ3G94vNxO4MvYU2UzBTqscDP" },
                { name: "[Kalasag +1] HIGHEST", url: "https://lh3.googleusercontent.com/d/1WKP09DaRu8M5jv1OffpX28UFOBEO6Fxf" },
                { name: "[Kalasag -1] LOWEST", url: "https://lh3.googleusercontent.com/d/1QiAKKYobUbpst6BuMGpBgjJ10RavTYaE" }
            ]
        ];

        let currentStep = 0;

        function rollDice(index) {
            if (index !== currentStep) return;
            const dieElement = document.getElementById("die-" + index);
            dieElement.classList.add('rolling');
            dieElement.textContent = "ROLLING...";

            setTimeout(() => {
                const pool = dicePools[index];
                const result = pool[Math.floor(Math.random() * pool.length)];
                dieElement.textContent = ""; 
                dieElement.classList.remove('rolling', 'active');
                dieElement.classList.add('rolled');
                const contentDiv = document.createElement("div");
                contentDiv.className = "result-content";
                const img = document.createElement("img");
                img.src = result.url;
                img.alt = ""; 
                const label = document.createElement("div");
                label.className = "result-label";
                label.textContent = result.name;
                contentDiv.appendChild(img);
                contentDiv.appendChild(label);
                dieElement.appendChild(contentDiv);
                currentStep++;
                if (currentStep < 3) {
                    const nextDie = document.getElementById("die-" + currentStep);
                    nextDie.classList.add('active');
                    nextDie.textContent = "READY";
                }
            }, 800);
        }

        function resetBoard() { location.reload(); }

        // --- INSTALL LOGIC ---
        let deferredPrompt;
        const installBtn = document.getElementById('install-button');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent Chrome 67 and earlier from automatically showing the prompt
            e.preventDefault();
            // Stash the event so it can be triggered later.
            deferredPrompt = e;
            
            // Only show the button if NOT running in standalone mode
            if (!window.matchMedia('(display-mode: standalone)').matches) {
                installBtn.style.display = 'block';
            }
        });

        installBtn.addEventListener('click', (e) => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        installBtn.style.display = 'none';
                    }
                    deferredPrompt = null;
                });
            }
        });

        // Hide button if already installed (fallback check)
        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
            });
        }
    </script>    
</body>
</html>
